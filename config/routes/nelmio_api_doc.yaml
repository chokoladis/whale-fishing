when@dev: &nelmio_routes
    nelmio_api_doc.swagger_ui:
        resource: '@NelmioApiDocBundle/config/routing/swaggerui.php'
        prefix: /api/doc

    nelmio_api_doc.swagger_json:
        path: /api/doc.json
        methods: GET
        defaults: { _controller: nelmio_api_doc.controller.swagger_json }

when@local: *nelmio_routes
