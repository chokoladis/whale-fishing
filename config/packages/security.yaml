security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'argon2id'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        login:
            pattern: ^/api/v1/auth/login
            stateless: true
            json_login:
                check_path: /api/v1/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        api_auth:
            pattern: ^/api/v1/auth
            security:
                false
        api_coin:
            pattern: ^/api/v1/coin
            security:
                false

        api_transaction_daily:
            pattern: ^/api/v1/transaction/topDaily/
            security:
                false
        api_transaction_hourly:
            pattern: ^/api/v1/transaction/topHourly/
            security:
                false
        api:
            pattern:   ^/api
            stateless: true
            jwt: ~


    access_control:
        - { path: ^/api/v1/auth/, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/coin/, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/transaction/topDaily/, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/transaction/topHourly/, roles: PUBLIC_ACCESS }
        - { path: ^/api,       roles: IS_AUTHENTICATED_FULLY }
when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: bcrypt
                cost: 4 # Lowest possible value for bcrypt
                memory_cost: 10 # Lowest possible value for argon
