framework:
    rate_limiter:
        login_register:
            policy: sliding_window
            limit: 5
            interval: '10 minutes'
        password_restore:
            policy: sliding_window
            limit: 4
            interval: '30 minutes'
        #[rateLimit] ?
        api:
            policy: token_bucket
            limit: 2
            rate: { interval: '1 minute' }

