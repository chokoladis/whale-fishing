services:
    php:
        container_name: wf_php
        build:
            context: .
            dockerfile: dockerfiles/php/Dockerfile
            args:
                - PUID=${PUID}
                - PGID=${PGID}
        volumes:
            - .:/var/www/app
            - ./dockerfiles/php/conf/php.ini:/usr/local/etc/php/php.ini
            - ./dockerfiles/php/conf/php.ini:/usr/local/etc/php/cli/php.ini

        depends_on:
            db:
                condition: service_started
            rabbitmq:
                condition: service_healthy

    nginx:
        container_name: wf_nginx
        build: ./dockerfiles/nginx
        ports:
            - ${NGINX_HOST_HTTP_PORT}:80
        volumes:
            - .:/var/www/app:rw
        depends_on:
            - php

    db:
        image: postgres:18
        container_name: wf_db
        ports:
            - "5433:5432"
        environment:
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD}'
            POSTGRES_DB: '${DB_DATABASE}'
    pgadmin:
        image: dpage/pgadmin4:9.12
        container_name: wf_pgadmin
        ports:
            - "5434:80"
        environment:
            PGADMIN_DEFAULT_EMAIL: '${PGADMIN_EMAIL}'
            PGADMIN_DEFAULT_PASSWORD: '${PGADMIN_DEFAULT_PASSWORD}'
            PMA_HOST: db
        depends_on:
            - db

    mercure:
      image: dunglas/mercure
      restart: unless-stopped
      ports:
        - "3000:80"
      environment:
        SERVER_NAME: ':80'  # HTTP для dev
        MERCURE_PUBLISHER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
        MERCURE_SUBSCRIBER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
        MERCURE_EXTRA_DIRECTIVES: |
          cors_origins http://127.0.0.1:8000
      # Comment the following line to disable the development mode
      command: /usr/bin/caddy run --config /etc/caddy/dev.Caddyfile
      volumes:
        - mercure_data:/data
        - mercure_config:/config

    rabbitmq:
      image: rabbitmq:3-management
      container_name: wf_rabbitmq
      ports:
          - "5672:5672"   # AMQP
          - "15672:15672" # UI панель
      environment:
          RABBITMQ_DEFAULT_USER: '${RABBITMQ_USER:-guest}'
          RABBITMQ_DEFAULT_PASS: '${RABBITMQ_PASS:-guest}'
      healthcheck:
          test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
          interval: 5s
          timeout: 5s
          retries: 5

    messenger_worker:
        container_name: wf_messenger
        build:
            context: .
            dockerfile: dockerfiles/php/Dockerfile
        command: php bin/console messenger:consume async -vv
        restart: on-failure
        volumes:
            - .:/var/www/app
        depends_on:
            db:
                condition: service_started
            rabbitmq:
                condition: service_healthy
volumes:
  mercure_data:
  mercure_config:
